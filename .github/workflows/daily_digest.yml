name: Daily Job Digest

on:
  schedule:
    # Runs every day at 7:00 AM Paris time (06:00 UTC in winter, 05:00 UTC in summer)
    # Adjust if needed: https://crontab.guru
    - cron: "0 6 * * *"

  # Allows you to run manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape-and-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen-jobs cache
        uses: actions/cache@v4
        with:
          path: data/seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: |
            seen-jobs-

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
        run: python scraper.py

      - name: Save updated seen-jobs
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
